<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Doctors | MediConnect Portal</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/doctors.css">
</head>
<body>

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">🏥</div>
      <span class="logo-name">MediConnect</span>
    </div>
    <div class="nav-label">Menu</div>
    <nav class="nav">
      <a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a>
      <a href="doctors.html" class="active"><span class="icon">🔍</span> Search Doctors</a>
      <a href="bookings.html"><span class="icon">📅</span> My Bookings</a>
      <a href="profile.html"><span class="icon">👤</span> Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-name" id="userName"></div>
      <div class="user-role" id="userRole"></div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <p class="page-header-sub">Find the right specialist for you</p>
      <h1 class="page-header-title">Search Doctors</h1>
    </div>

    <div class="search-section">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search by name or specialization..." oninput="filterDoctors()">
      </div>
      <select class="filter-select" id="specFilter" onchange="filterDoctors()">
        <option value="">All Specializations</option>
        <option value="Cardiology">Cardiology</option>
        <option value="Dermatology">Dermatology</option>
        <option value="Orthopedics">Orthopedics</option>
        <option value="Neurology">Neurology</option>
        <option value="Pediatrics">Pediatrics</option>
        <option value="General">General Medicine</option>
      </select>
      <button class="btn btn-primary" onclick="filterDoctors()">Search</button>
    </div>

    <div class="results-header">
      <span class="results-title">Available Doctors</span>
      <span class="results-count" id="resultsCount">Loading...</span>
    </div>

    <div class="doctors-grid" id="doctorsGrid">
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">⏳</div>
        <div class="empty-title">Loading doctors...</div>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/doctors.js"></script>
</body>
</html>
