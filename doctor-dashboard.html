<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Dashboard — MediConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #171b26;
      --surface2: #1e2333;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #e8eaf0;
      --muted: #7a8099;
      --teal: #2dd4bf;
      --teal-dim: rgba(45,212,191,0.12);
      --amber: #fbbf24;
      --amber-dim: rgba(251,191,36,0.12);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.1);
      --green: #4ade80;
      --green-dim: rgba(74,222,128,0.1);
      --blue: #60a5fa;
      --blue-dim: rgba(96,165,250,0.1);
      --sidebar-w: 240px;
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ─────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      position: fixed;
      height: 100vh;
      top: 0; left: 0;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 0 20px 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .sidebar-logo .logo-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--teal);
      letter-spacing: -0.3px;
    }

    .sidebar-logo .logo-sub {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      border-radius: 0;
      transition: all 0.15s;
      text-decoration: none;
      border-left: 2px solid transparent;
    }

    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .nav-item.active { color: var(--teal); border-left-color: var(--teal); background: var(--teal-dim); }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }

    .doctor-badge {
      display: flex; align-items: center; gap: 10px;
    }

    .avatar {
      width: 36px; height: 36px;
      background: var(--teal-dim);
      border: 1px solid var(--teal);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; color: var(--teal);
      flex-shrink: 0;
    }

    .badge-info { flex: 1; min-width: 0; }
    .badge-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge-role { font-size: 11px; color: var(--teal); font-family: 'DM Mono', monospace; }

    .logout-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 18px; padding: 4px; transition: color 0.15s;
    }
    .logout-btn:hover { color: var(--red); }

    /* ── Main ────────────────────────────────────────── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 32px;
      max-width: 1200px;
    }

    .page-header {
      margin-bottom: 28px;
    }

    .page-title { font-size: 24px; font-weight: 600; letter-spacing: -0.4px; }
    .page-sub { color: var(--muted); font-size: 14px; margin-top: 4px; }

    /* ── Stats row ───────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex; align-items: center; gap: 16px;
    }

    .stat-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .stat-icon.teal { background: var(--teal-dim); }
    .stat-icon.amber { background: var(--amber-dim); }
    .stat-icon.blue { background: var(--blue-dim); }

    .stat-val { font-size: 28px; font-weight: 600; line-height: 1; }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* ── Tab nav ─────────────────────────────────────── */
    .tab-nav {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 20px;
      width: fit-content;
    }

    .tab-btn {
      background: none; border: none;
      padding: 8px 18px;
      font-size: 13px; font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { background: var(--surface2); color: var(--text); }

    /* ── Panels ──────────────────────────────────────── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Appointment cards ───────────────────────────── */
    .appt-list { display: flex; flex-direction: column; gap: 10px; }

    .appt-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.15s;
    }

    .appt-card:hover { border-color: var(--border2); }

    .appt-time-box {
      text-align: center;
      min-width: 52px;
      padding: 8px 6px;
      background: var(--surface2);
      border-radius: 8px;
    }

    .appt-time { font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--teal); }
    .appt-ampm { font-size: 10px; color: var(--muted); }

    .appt-info { flex: 1; }
    .appt-patient { font-size: 15px; font-weight: 500; }
    .appt-reason { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .appt-contact { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .appt-actions { display: flex; gap: 8px; align-items: center; }

    .chip {
      display: inline-flex; align-items: center;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 12px; font-weight: 500;
      font-family: 'DM Mono', monospace;
    }

    .chip-pending { background: var(--amber-dim); color: var(--amber); }
    .chip-confirmed { background: var(--green-dim); color: var(--green); }
    .chip-cancelled { background: var(--red-dim); color: var(--red); }
    .chip-completed { background: var(--blue-dim); color: var(--blue); }

    .btn {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px; font-weight: 500;
      cursor: pointer; border: none;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }

    .btn-confirm { background: var(--green-dim); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
    .btn-confirm:hover { background: rgba(74,222,128,0.2); }
    .btn-cancel { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
    .btn-cancel:hover { background: rgba(248,113,113,0.2); }
    .btn-view { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn-view:hover { color: var(--text); border-color: var(--border2); }

    /* ── Calendar ────────────────────────────────────── */
    .calendar-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .cal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .cal-title { font-size: 15px; font-weight: 600; }

    .cal-nav { display: flex; gap: 8px; }
    .cal-nav-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
      width: 30px; height: 30px; border-radius: 8px;
      font-size: 14px; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .cal-nav-btn:hover { color: var(--text); border-color: var(--border2); }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .cal-day-label {
      text-align: center;
      padding: 10px 4px;
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      border-bottom: 1px solid var(--border);
    }

    .cal-cell {
      min-height: 72px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 8px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell:hover { background: var(--surface2); }
    .cal-cell.today { background: var(--teal-dim); }
    .cal-cell.other-month .cal-day-num { color: rgba(255,255,255,0.15); }

    .cal-day-num { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    .cal-cell.today .cal-day-num { color: var(--teal); }

    .cal-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--teal);
      margin: 1px;
    }

    /* ── Patient modal ───────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 500;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-backdrop.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 28px;
      width: 480px;
      max-width: 95vw;
      max-height: 85vh;
      overflow-y: auto;
      transform: translateY(12px);
      transition: transform 0.2s;
    }

    .modal-backdrop.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }

    .modal-title { font-size: 17px; font-weight: 600; }

    .close-btn {
      background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: 20px;
      padding: 4px; transition: color 0.15s;
    }
    .close-btn:hover { color: var(--text); }

    .patient-info-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
    .patient-info-label { font-size: 12px; color: var(--muted); width: 72px; flex-shrink: 0; margin-top: 1px; }
    .patient-info-val { font-size: 14px; }

    .modal-section-title {
      font-size: 12px; font-weight: 600;
      color: var(--muted); letter-spacing: 0.5px;
      text-transform: uppercase;
      margin: 20px 0 10px;
    }

    .history-item {
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }

    .history-date { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .history-reason { font-size: 13px; margin-top: 2px; }

    /* ── Empty state ─────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 32px; margin-bottom: 10px; }
    .empty-title { font-size: 15px; font-weight: 500; color: var(--text); }
    .empty-sub { font-size: 13px; margin-top: 4px; }

    /* ── Spinner ─────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Loading shimmer ─────────────────────────────── */
    .shimmer {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 8px;
      height: 72px;
    }

    @keyframes shimmer { to { background-position: -200% 0; } }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-text">MediConnect</div>
    <div class="logo-sub">DOCTOR PORTAL</div>
  </div>

  <a class="nav-item active" onclick="showPanel('today')">
    <span class="nav-icon">📅</span> Today
  </a>
  <a class="nav-item" onclick="showPanel('pending')">
    <span class="nav-icon">⏳</span> Pending <span id="pendingBadge" style="margin-left:auto;background:var(--amber-dim);color:var(--amber);font-size:11px;padding:1px 7px;border-radius:100px;display:none"></span>
  </a>
  <a class="nav-item" onclick="showPanel('calendar')">
    <span class="nav-icon">🗓</span> Calendar
  </a>
  <a class="nav-item" onclick="showPanel('all')">
    <span class="nav-icon">📋</span> All appointments
  </a>

  <div class="sidebar-footer">
    <div class="doctor-badge">
      <div class="avatar" id="sidebarInitial">D</div>
      <div class="badge-info">
        <div class="badge-name" id="userName">Doctor</div>
        <div class="badge-role">DOCTOR</div>
      </div>
      <button class="logout-btn" onclick="logout()" title="Logout">⏏</button>
    </div>
  </div>
</aside>

<!-- Main -->
<main class="main">
  <div class="page-header">
    <div class="page-title" id="pageTitle">Good morning, Dr. <span id="doctorNameHeader">—</span></div>
    <div class="page-sub" id="todayDate"></div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon teal">📅</div>
      <div>
        <div class="stat-val" id="statToday">—</div>
        <div class="stat-label">Today's appointments</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon amber">⏳</div>
      <div>
        <div class="stat-val" id="statPending">—</div>
        <div class="stat-label">Pending requests</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon blue">👥</div>
      <div>
        <div class="stat-val" id="statPatients">—</div>
        <div class="stat-label">Total patients</div>
      </div>
    </div>
  </div>

  <!-- Tab nav (hidden for calendar since it's separate) -->
  <div class="tab-nav" id="tabNav" style="display:none">
    <button class="tab-btn active" onclick="filterAll('all', this)">All</button>
    <button class="tab-btn" onclick="filterAll('pending', this)">Pending</button>
    <button class="tab-btn" onclick="filterAll('confirmed', this)">Confirmed</button>
    <button class="tab-btn" onclick="filterAll('cancelled', this)">Cancelled</button>
  </div>

  <!-- TODAY panel -->
  <div class="panel active" id="panel-today">
    <div class="appt-list" id="todayList">
      <div class="shimmer"></div>
      <div class="shimmer"></div>
      <div class="shimmer"></div>
    </div>
  </div>

  <!-- PENDING panel -->
  <div class="panel" id="panel-pending">
    <div class="appt-list" id="pendingList"></div>
  </div>

  <!-- CALENDAR panel -->
  <div class="panel" id="panel-calendar">
    <div class="calendar-wrap">
      <div class="cal-header">
        <div class="cal-title" id="calMonthTitle"></div>
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
          <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
        </div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <!-- ALL panel -->
  <div class="panel" id="panel-all">
    <div class="appt-list" id="allList"></div>
  </div>
</main>

<!-- Patient modal -->
<div class="modal-backdrop" id="patientModal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalPatientName">Patient details</div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="patient-info-row"><span class="patient-info-label">Email</span><span class="patient-info-val" id="modalEmail">—</span></div>
    <div class="patient-info-row"><span class="patient-info-label">Phone</span><span class="patient-info-val" id="modalPhone">—</span></div>

    <div class="modal-section-title">Appointment history</div>
    <div id="modalHistory"></div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script>
  // ── Auth guard (works with both old and new utils.js) ──
  (function() {
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = 'index.html'; return; }
    const role = localStorage.getItem('user_role') || '';
    if (role && role !== 'DOCTOR') {
      window.location.href = 'dashboard.html';
      return;
    }
  })();

  // Populate sidebar footer (works regardless of utils.js version)
  const _name = localStorage.getItem('user_name') || 'Doctor';
  const _nameEl = document.getElementById('userName');
  if (_nameEl) _nameEl.textContent = _name;

  const userName = localStorage.getItem('user_name') || 'Doctor';
  const sidebarInitial = document.getElementById('sidebarInitial');
  if (sidebarInitial) sidebarInitial.textContent = userName[0].toUpperCase();

  // Greeting
  const hour = new Date().getHours();
  const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  const pageTitleEl = document.getElementById('pageTitle');
  if (pageTitleEl) pageTitleEl.textContent = `${greet}, Dr. ${userName}`;
  const todayDateEl = document.getElementById('todayDate');
  if (todayDateEl) todayDateEl.textContent = new Date().toLocaleDateString('en-IN', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  let allAppointments = [];
  let calMonth = new Date().getMonth();
  let calYear = new Date().getFullYear();

  // ── Navigation ──────────────────────────────────────
  function showPanel(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`panel-${name}`).classList.add('active');
    event.currentTarget.classList.add('active');
    document.getElementById('tabNav').style.display = name === 'all' ? 'flex' : 'none';

    if (name === 'calendar') renderCalendar();
    if (name === 'pending') renderPending();
    if (name === 'all') renderAllList(allAppointments);
  }

  async function loadDashboard() {
    try {
      const res = await fetch(`${API_BASE}/doctor/dashboard`, { headers: authHeaders() });
      if (res.status === 401) { logout(); return; }
      if (res.status === 403) {
        document.getElementById('todayList').innerHTML = `<div class="empty"><div class="empty-icon">🔒</div><div class="empty-title">Access denied</div><div class="empty-sub">Your account doesn't have doctor permissions. Contact admin.</div></div>`;
        return;
      }
      if (res.status === 404) {
        document.getElementById('todayList').innerHTML = `<div class="empty"><div class="empty-icon">⚙️</div><div class="empty-title">Doctor routes not deployed yet</div><div class="empty-sub">Push doctor_routes.py to your backend and restart the server.</div></div>`;
        return;
      }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      document.getElementById('statToday').textContent = data.today_appointments;
      document.getElementById('statPending').textContent = data.pending_requests;
      document.getElementById('statPatients').textContent = data.total_patients;

      if (data.pending_requests > 0) {
        const badge = document.getElementById('pendingBadge');
        badge.textContent = data.pending_requests;
        badge.style.display = 'inline';
      }
    } catch(e) {
      console.error('Dashboard load failed:', e);
      document.getElementById('statToday').textContent = '!';
      document.getElementById('statPending').textContent = '!';
      document.getElementById('statPatients').textContent = '!';
    }
  }

  // ── Today's appointments ────────────────────────────
  async function loadToday() {
    try {
      const res = await fetch(`${API_BASE}/doctor/appointments/today`, { headers: authHeaders() });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const appts = await res.json();
      const list = document.getElementById('todayList');

      if (appts.length === 0) {
        list.innerHTML = `<div class="empty"><div class="empty-icon">☀️</div><div class="empty-title">No appointments today</div><div class="empty-sub">Enjoy your day!</div></div>`;
        return;
      }

      list.innerHTML = appts.map(a => buildApptCard(a, true)).join('');
    } catch(e) {
      console.error('loadToday failed:', e);
      document.getElementById('todayList').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load appointments</div><div class="empty-sub">Check console for details. Backend may need redeployment.</div></div>`;
    }
  }

  // ── All appointments ────────────────────────────────
  async function loadAllAppointments() {
    try {
      const res = await fetch(`${API_BASE}/doctor/appointments`, { headers: authHeaders() });
      if (!res.ok) throw new Error();
      allAppointments = await res.json();
    } catch {}
  }

  function renderPending() {
    const pending = allAppointments.filter(a => a.status === 'pending');
    const list = document.getElementById('pendingList');
    if (pending.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">✅</div><div class="empty-title">No pending requests</div><div class="empty-sub">All caught up!</div></div>`;
      return;
    }
    list.innerHTML = pending.map(a => buildApptCard(a, true)).join('');
  }

  function renderAllList(appts) {
    const list = document.getElementById('allList');
    if (appts.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">No appointments</div></div>`;
      return;
    }
    list.innerHTML = appts.map(a => buildApptCard(a, false)).join('');
  }

  function filterAll(status, btn) {
    document.querySelectorAll('#tabNav .tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = status === 'all' ? allAppointments : allAppointments.filter(a => a.status === status);
    renderAllList(filtered);
  }

  // ── Card builder ────────────────────────────────────
  function buildApptCard(a, showActions) {
    const dt = new Date(a.date_time);
    const timeStr = dt.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
    const [time, ampm] = timeStr.split(' ');
    const dateStr = dt.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });

    const chipClass = { pending: 'chip-pending', confirmed: 'chip-confirmed', cancelled: 'chip-cancelled', completed: 'chip-completed' }[a.status] || 'chip-pending';

    const actions = showActions && a.status === 'pending' ? `
      <button class="btn btn-confirm" onclick="confirmAppt(${a.appointment_id}, this)">Confirm</button>
      <button class="btn btn-cancel" onclick="cancelAppt(${a.appointment_id}, this)">Decline</button>
    ` : '';

    return `
      <div class="appt-card" id="appt-${a.appointment_id}">
        <div class="appt-time-box">
          <div class="appt-time">${time}</div>
          <div class="appt-ampm">${ampm || ''}</div>
          <div class="appt-ampm" style="margin-top:3px;color:var(--muted)">${dateStr}</div>
        </div>
        <div class="appt-info">
          <div class="appt-patient">${a.patient_name}</div>
          <div class="appt-reason">${a.reason || 'No reason specified'}</div>
          <div class="appt-contact">${a.patient_email}${a.patient_phone ? ' · ' + a.patient_phone : ''}</div>
        </div>
        <div class="appt-actions">
          <span class="chip ${chipClass}">${a.status}</span>
          ${actions}
          <button class="btn btn-view" onclick="viewPatient(${a.appointment_id}, '${a.patient_name}', '${a.patient_email}', '${a.patient_phone || ''}')">View</button>
        </div>
      </div>`;
  }

  // ── Confirm / cancel ────────────────────────────────
  async function confirmAppt(id, btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    try {
      const res = await fetch(`${API_BASE}/doctor/appointments/${id}/confirm`, {
        method: 'PUT', headers: authHeaders()
      });
      if (res.ok) {
        const card = document.getElementById(`appt-${id}`);
        if (card) {
          card.querySelector('.chip').className = 'chip chip-confirmed';
          card.querySelector('.chip').textContent = 'confirmed';
          card.querySelectorAll('.btn-confirm, .btn-cancel').forEach(b => b.remove());
        }
        // Update allAppointments cache
        const appt = allAppointments.find(a => a.appointment_id === id);
        if (appt) appt.status = 'confirmed';
        loadDashboard();
      }
    } catch {}
    btn.disabled = false;
  }

  async function cancelAppt(id, btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    try {
      const res = await fetch(`${API_BASE}/doctor/appointments/${id}/cancel`, {
        method: 'PUT', headers: authHeaders()
      });
      if (res.ok) {
        const card = document.getElementById(`appt-${id}`);
        if (card) {
          card.querySelector('.chip').className = 'chip chip-cancelled';
          card.querySelector('.chip').textContent = 'cancelled';
          card.querySelectorAll('.btn-confirm, .btn-cancel').forEach(b => b.remove());
        }
        const appt = allAppointments.find(a => a.appointment_id === id);
        if (appt) appt.status = 'cancelled';
        loadDashboard();
      }
    } catch {}
    btn.disabled = false;
  }

  // ── Patient modal ───────────────────────────────────
  function viewPatient(apptId, name, email, phone) {
    document.getElementById('modalPatientName').textContent = name;
    document.getElementById('modalEmail').textContent = email || '—';
    document.getElementById('modalPhone').textContent = phone || '—';

    // Show appointment history from local cache
    const patientAppts = allAppointments.filter(a => a.patient_email === email);
    document.getElementById('modalHistory').innerHTML = patientAppts.length ? patientAppts.map(a => `
      <div class="history-item">
        <div>
          <div class="history-date">${new Date(a.date_time).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })}</div>
          <div class="history-reason">${a.reason || 'No reason specified'}</div>
        </div>
        <span class="chip ${{ pending:'chip-pending', confirmed:'chip-confirmed', cancelled:'chip-cancelled', completed:'chip-completed' }[a.status] || 'chip-pending'}">${a.status}</span>
      </div>`).join('') :
      `<div style="color:var(--muted);font-size:13px">No history found</div>`;

    document.getElementById('patientModal').classList.add('open');
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('patientModal')) {
      document.getElementById('patientModal').classList.remove('open');
    }
  }

  // ── Calendar ────────────────────────────────────────
  function renderCalendar() {
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('calMonthTitle').textContent = `${months[calMonth]} ${calYear}`;

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    ['SUN','MON','TUE','WED','THU','FRI','SAT'].forEach(d => {
      grid.innerHTML += `<div class="cal-day-label">${d}</div>`;
    });

    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const daysInPrev = new Date(calYear, calMonth, 0).getDate();
    const today = new Date();

    // Build set of dates with appointments
    const apptDates = new Set(allAppointments
      .filter(a => a.status !== 'cancelled')
      .map(a => {
        const d = new Date(a.date_time);
        return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      }));

    // Prev month filler
    for (let i = firstDay - 1; i >= 0; i--) {
      grid.innerHTML += `<div class="cal-cell other-month"><div class="cal-day-num">${daysInPrev - i}</div></div>`;
    }

    // Current month
    for (let d = 1; d <= daysInMonth; d++) {
      const isToday = d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear();
      const key = `${calYear}-${calMonth}-${d}`;
      const dots = apptDates.has(key) ? `<div><span class="cal-dot"></span></div>` : '';
      grid.innerHTML += `<div class="cal-cell${isToday ? ' today' : ''}"><div class="cal-day-num">${d}</div>${dots}</div>`;
    }

    // Next month filler
    const cells = firstDay + daysInMonth;
    const remainder = cells % 7 === 0 ? 0 : 7 - (cells % 7);
    for (let d = 1; d <= remainder; d++) {
      grid.innerHTML += `<div class="cal-cell other-month"><div class="cal-day-num">${d}</div></div>`;
    }
  }

  function changeMonth(dir) {
    calMonth += dir;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0)  { calMonth = 11; calYear--; }
    renderCalendar();
  }

  // ── Init ────────────────────────────────────────────
  async function init() {
    await Promise.all([loadDashboard(), loadAllAppointments()]);
    loadToday();
  }

  init();
</script>
</body>
</html>
