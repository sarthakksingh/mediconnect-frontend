<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | MediConnect Portal</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .section-tabs {
      display: flex;
      gap: 4px;
      background: var(--card-bg, #fff);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 20px;
      width: fit-content;
    }

    .section-tab {
      background: none; border: none;
      padding: 8px 18px;
      font-size: 13px; font-weight: 500;
      color: var(--muted); cursor: pointer;
      border-radius: 7px;
      transition: all 0.15s;
      font-family: inherit;
    }
    .section-tab:hover { color: var(--text, #111); }
    .section-tab.active { background: var(--bg, #f5f7fa); color: var(--text, #111); }

    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Data table ──────────────────────────────────── */
    .data-table-wrap {
      background: var(--card-bg, #fff);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .table-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }

    .table-toolbar-left { display: flex; gap: 8px; align-items: center; }
    .table-toolbar-right { display: flex; gap: 8px; align-items: center; }

    .search-sm {
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      background: var(--bg, #f5f7fa);
      color: var(--text, #111);
      width: 220px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-sm:focus { border-color: var(--teal); }

    .select-sm {
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      background: var(--bg, #f5f7fa);
      color: var(--text, #111);
      outline: none;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      padding: 10px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      background: var(--bg, #f5f7fa);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(45,212,191,0.03); }

    tbody td {
      padding: 12px 16px;
      color: var(--text, #111);
      vertical-align: middle;
    }

    .td-muted { color: var(--muted); font-size: 12px; }
    .td-mono { font-family: 'DM Mono', monospace; font-size: 12px; }

    /* ── Action buttons in table ─────────────────────── */
    .btn-sm {
      padding: 5px 12px;
      border-radius: 7px;
      font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--bg, #f5f7fa);
      color: var(--muted);
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-sm:hover { color: var(--teal); border-color: var(--teal); }

    .btn-sm-danger {
      padding: 5px 12px;
      border-radius: 7px;
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(239,68,68,0.25);
      background: rgba(239,68,68,0.07);
      color: #dc2626;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-sm-danger:hover { background: rgba(239,68,68,0.15); }

    /* ── Add doctor modal ────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex; align-items: center; justify-content: center;
      z-index: 500;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.visible { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--card-bg, #fff);
      border-radius: 16px; padding: 28px;
      width: 440px; max-width: 95vw;
      transform: translateY(10px); transition: transform 0.2s;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    }
    .modal-overlay.visible .modal { transform: translateY(0); }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title { font-size: 17px; font-weight: 600; }
    .modal-close {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 20px; padding: 4px; transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text, #111); }

    .form-group-sm { margin-bottom: 14px; }
    .form-group-sm label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 5px; }
    .form-group-sm input, .form-group-sm select {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px; font-family: inherit;
      background: var(--bg, #f5f7fa);
      color: var(--text, #111);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group-sm input:focus, .form-group-sm select:focus { border-color: var(--teal); }

    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* ── Stats cards ─────────────────────────────────── */
    .stats-mini-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .stats-mini-card {
      background: var(--card-bg, #fff);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      text-align: center;
    }

    .stats-mini-val {
      font-size: 26px; font-weight: 700;
      font-family: 'DM Serif Display', serif;
      color: var(--teal);
      line-height: 1;
    }

    .stats-mini-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── Shimmer ─────────────────────────────────────── */
    .shimmer {
      background: linear-gradient(90deg, var(--border) 25%, var(--bg, #f5f7fa) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 10px; height: 48px; margin-bottom: 8px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    .spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid rgba(0,0,0,0.1); border-top-color: var(--teal);
      border-radius: 50%; animation: spin 0.6s linear infinite;
      vertical-align: middle; margin-right: 5px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .msg-inline { font-size: 13px; padding: 8px 12px; border-radius: 8px; margin-top: 8px; }
    .msg-inline.error { background: rgba(239,68,68,0.1); color: #dc2626; }
    .msg-inline.success { background: rgba(34,197,94,0.1); color: #16a34a; }

    @media (max-width: 900px) {
      .stats-mini-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">🏥</div>
      <span class="logo-name">MediConnect</span>
    </div>
    <div class="nav-label">Admin Portal</div>
    <nav class="nav">
      <a href="admin-dashboard.html" class="active"><span class="icon">🏠</span> Dashboard</a>
      <a href="#" onclick="switchPanel('users'); return false;"><span class="icon">👥</span> Users</a>
      <a href="#" onclick="switchPanel('appointments'); return false;"><span class="icon">📅</span> Appointments</a>
      <a href="#" onclick="switchPanel('doctors'); return false;"><span class="icon">👨‍⚕️</span> Doctors</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-name" id="userName"></div>
      <div class="user-role" id="userRole"></div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </aside>

  <main class="main">

    <div class="header-row" style="margin-bottom:24px">
      <div>
        <p class="header-greeting">Admin panel 🛡️</p>
        <h1 class="header-title" id="headerName">MediConnect</h1>
      </div>
      <div class="header-date" id="headerDate"></div>
    </div>

    <!-- Top stats always visible -->
    <div class="cards-grid" style="margin-bottom:28px">
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-icon teal">👥</div>
          <span class="chip chip-blue">Total</span>
        </div>
        <div class="stat-value" id="statUsers">—</div>
        <div class="stat-label">Registered Users</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-icon" style="background:rgba(139,92,246,0.12)">👨‍⚕️</div>
          <span class="chip chip-purple" style="background:rgba(139,92,246,0.1);color:#7c3aed">Active</span>
        </div>
        <div class="stat-value" id="statDoctors">—</div>
        <div class="stat-label">Doctors</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-icon blue">📅</div>
          <span class="chip chip-green">All time</span>
        </div>
        <div class="stat-value" id="statAppts">—</div>
        <div class="stat-label">Total Appointments</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-icon" style="background:rgba(251,191,36,0.12)">⏳</div>
          <span class="chip chip-amber">Pending</span>
        </div>
        <div class="stat-value" id="statPending">—</div>
        <div class="stat-label">Awaiting Confirmation</div>
      </div>
    </div>

    <!-- Section tabs -->
    <div class="section-tabs">
      <button class="section-tab active" id="tab-overview" onclick="switchPanel('overview')">Overview</button>
      <button class="section-tab" id="tab-users" onclick="switchPanel('users')">Users</button>
      <button class="section-tab" id="tab-appointments" onclick="switchPanel('appointments')">Appointments</button>
      <button class="section-tab" id="tab-doctors" onclick="switchPanel('doctors')">Doctors</button>
    </div>

    <!-- OVERVIEW panel -->
    <div class="panel active" id="panel-overview">
      <div class="stats-mini-grid" id="apptStatusGrid">
        <div class="shimmer"></div>
        <div class="shimmer"></div>
        <div class="shimmer"></div>
        <div class="shimmer"></div>
      </div>
      <div class="data-table-wrap">
        <div class="table-toolbar">
          <span style="font-size:14px;font-weight:600">Recent appointments</span>
        </div>
        <div id="recentApptTable">
          <div style="padding:24px"><div class="shimmer"></div><div class="shimmer"></div><div class="shimmer"></div></div>
        </div>
      </div>
    </div>

    <!-- USERS panel -->
    <div class="panel" id="panel-users">
      <div class="data-table-wrap">
        <div class="table-toolbar">
          <div class="table-toolbar-left">
            <input class="search-sm" type="text" placeholder="Search by name or email..." id="userSearch" oninput="filterUsers()">
          </div>
          <div class="table-toolbar-right">
            <select class="select-sm" id="roleFilter" onchange="filterUsers()">
              <option value="">All roles</option>
              <option value="PATIENT">Patients</option>
              <option value="DOCTOR">Doctors</option>
              <option value="ADMIN">Admins</option>
            </select>
          </div>
        </div>
        <div id="usersTable"><div style="padding:24px"><div class="shimmer"></div><div class="shimmer"></div><div class="shimmer"></div></div></div>
      </div>
    </div>

    <!-- APPOINTMENTS panel -->
    <div class="panel" id="panel-appointments">
      <div class="data-table-wrap">
        <div class="table-toolbar">
          <div class="table-toolbar-left">
            <input class="search-sm" type="text" placeholder="Search patient or doctor..." id="apptSearch" oninput="filterAppts()">
          </div>
          <div class="table-toolbar-right">
            <select class="select-sm" id="apptStatusFilter" onchange="filterAppts()">
              <option value="">All statuses</option>
              <option value="pending">Pending</option>
              <option value="confirmed">Confirmed</option>
              <option value="cancelled">Cancelled</option>
              <option value="completed">Completed</option>
            </select>
          </div>
        </div>
        <div id="apptsTable"><div style="padding:24px"><div class="shimmer"></div><div class="shimmer"></div><div class="shimmer"></div></div></div>
      </div>
    </div>

    <!-- DOCTORS panel -->
    <div class="panel" id="panel-doctors">
      <div class="data-table-wrap">
        <div class="table-toolbar">
          <div class="table-toolbar-left">
            <input class="search-sm" type="text" placeholder="Search by name or specialization..." id="doctorSearch" oninput="filterDoctors()">
          </div>
          <div class="table-toolbar-right">
            <button class="btn btn-primary" onclick="openAddDoctor()">+ Add Doctor</button>
          </div>
        </div>
        <div id="doctorsTable"><div style="padding:24px"><div class="shimmer"></div><div class="shimmer"></div><div class="shimmer"></div></div></div>
      </div>
    </div>

  </main>

  <!-- Add doctor modal -->
  <div class="modal-overlay" id="addDoctorModal" onclick="handleModalClick(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Add Doctor</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group-sm">
        <label>Full Name</label>
        <input type="text" id="docName" placeholder="Dr. Rajan Mehta">
      </div>
      <div class="form-group-sm">
        <label>Specialization</label>
        <select id="docSpec">
          <option value="">Select specialization</option>
          <option>Cardiology</option>
          <option>Dermatology</option>
          <option>Orthopedics</option>
          <option>Neurology</option>
          <option>Pediatrics</option>
          <option>General Medicine</option>
          <option>Gynecology</option>
          <option>Ophthalmology</option>
          <option>ENT</option>
          <option>Psychiatry</option>
        </select>
      </div>
      <div class="form-group-sm">
        <label>Years of Experience</label>
        <input type="number" id="docExp" placeholder="5" min="0" max="60">
      </div>
      <div id="modalMsg"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="saveDocBtn" onclick="saveDoctor()">Add Doctor</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script>
    initSidebar(['ADMIN']);

    document.getElementById('headerName').textContent =
      'Welcome, ' + (localStorage.getItem('user_name') || 'Admin');
    document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-IN', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    let allUsers = [];
    let allAppts = [];
    let allDoctors = [];
    let editingDoctorId = null;

    // ── Panel switch ──────────────────────────────────
    function switchPanel(name) {
      document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
      const tab = document.getElementById('tab-' + name);
      if (tab) tab.classList.add('active');
      document.getElementById('panel-' + name).classList.add('active');
    }

    // ── Stats ─────────────────────────────────────────
    async function loadStats() {
      try {
        const res = await fetch(`${API_BASE}/admin/stats`, { headers: authHeaders() });
        if (res.status === 401) { logout(); return; }
        if (!res.ok) throw new Error();
        const d = await res.json();

        document.getElementById('statUsers').textContent = d.total_users;
        document.getElementById('statDoctors').textContent = d.total_doctors;
        document.getElementById('statAppts').textContent = d.total_appointments;
        document.getElementById('statPending').textContent = d.appointments_by_status.pending;

        const statusColors = {
          pending: 'chip-amber', confirmed: 'chip-green',
          cancelled: 'chip-red', completed: 'chip-blue'
        };
        const statusIcons = { pending: '⏳', confirmed: '✅', cancelled: '✖', completed: '🏁' };

        document.getElementById('apptStatusGrid').innerHTML =
          Object.entries(d.appointments_by_status).map(([status, count]) => `
            <div class="stats-mini-card">
              <div class="stats-mini-val">${count}</div>
              <div class="stats-mini-label">${statusIcons[status] || ''} ${status}</div>
            </div>`).join('');
      } catch {
        document.getElementById('apptStatusGrid').innerHTML =
          `<div style="color:var(--muted);font-size:13px;padding:12px;grid-column:1/-1">Could not load stats</div>`;
      }
    }

    // ── Users ─────────────────────────────────────────
    async function loadUsers() {
      try {
        const res = await fetch(`${API_BASE}/admin/users`, { headers: authHeaders() });
        if (!res.ok) throw new Error();
        allUsers = await res.json();
        renderUsers(allUsers);
      } catch {
        document.getElementById('usersTable').innerHTML = errorRow();
      }
    }

    function renderUsers(users) {
      if (!users.length) { document.getElementById('usersTable').innerHTML = emptyRow('No users found'); return; }
      const chipMap = { PATIENT: 'chip-green', DOCTOR: 'chip-blue', ADMIN: 'chip-amber' };
      document.getElementById('usersTable').innerHTML = `
        <table>
          <thead><tr>
            <th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Visits</th>
          </tr></thead>
          <tbody>
            ${users.map(u => `
              <tr>
                <td class="td-mono td-muted">#${u.user_id}</td>
                <td style="font-weight:500">${u.name}</td>
                <td class="td-muted">${u.email}</td>
                <td class="td-muted">${u.phone || '—'}</td>
                <td><span class="chip ${chipMap[u.role] || 'chip-green'}">${u.role}</span></td>
                <td class="td-muted">${u.appointment_count ?? '—'}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    }

    function filterUsers() {
      const q = document.getElementById('userSearch').value.toLowerCase();
      const role = document.getElementById('roleFilter').value;
      renderUsers(allUsers.filter(u =>
        (!q || u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)) &&
        (!role || u.role === role)
      ));
    }

    // ── Appointments ──────────────────────────────────
    async function loadAppointments() {
      try {
        const res = await fetch(`${API_BASE}/admin/appointments`, { headers: authHeaders() });
        if (!res.ok) throw new Error();
        allAppts = await res.json();
        renderAppts(allAppts);
        renderRecentAppts(allAppts.slice(0, 8));
      } catch {
        document.getElementById('apptsTable').innerHTML = errorRow();
        document.getElementById('recentApptTable').innerHTML = errorRow();
      }
    }

    function renderAppts(appts) {
      if (!appts.length) { document.getElementById('apptsTable').innerHTML = emptyRow('No appointments found'); return; }
      const chipMap = { pending:'chip-amber', confirmed:'chip-green', cancelled:'chip-red', completed:'chip-blue' };
      document.getElementById('apptsTable').innerHTML = `
        <table>
          <thead><tr>
            <th>ID</th><th>Patient</th><th>Doctor</th><th>Specialization</th><th>Date & Time</th><th>Reason</th><th>Status</th>
          </tr></thead>
          <tbody>
            ${appts.map(a => {
              const dt = new Date(a.date_time);
              return `<tr>
                <td class="td-mono td-muted">#${a.appointment_id}</td>
                <td style="font-weight:500">${a.patient_name}<div class="td-muted">${a.patient_email}</div></td>
                <td>${a.doctor_name}</td>
                <td class="td-muted">${a.doctor_specialization || '—'}</td>
                <td class="td-mono td-muted">${dt.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})} ${dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})}</td>
                <td class="td-muted">${a.reason || '—'}</td>
                <td><span class="chip ${chipMap[a.status] || 'chip-amber'}">${a.status}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`;
    }

    function renderRecentAppts(appts) {
      if (!appts.length) { document.getElementById('recentApptTable').innerHTML = emptyRow('No appointments yet'); return; }
      const chipMap = { pending:'chip-amber', confirmed:'chip-green', cancelled:'chip-red', completed:'chip-blue' };
      document.getElementById('recentApptTable').innerHTML = `
        <table>
          <thead><tr><th>Patient</th><th>Doctor</th><th>Date & Time</th><th>Status</th></tr></thead>
          <tbody>
            ${appts.map(a => {
              const dt = new Date(a.date_time);
              return `<tr>
                <td style="font-weight:500">${a.patient_name}</td>
                <td class="td-muted">${a.doctor_name}</td>
                <td class="td-mono td-muted">${dt.toLocaleDateString('en-IN',{day:'numeric',month:'short'})} · ${dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})}</td>
                <td><span class="chip ${chipMap[a.status] || 'chip-amber'}">${a.status}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`;
    }

    function filterAppts() {
      const q = document.getElementById('apptSearch').value.toLowerCase();
      const status = document.getElementById('apptStatusFilter').value;
      renderAppts(allAppts.filter(a =>
        (!q || a.patient_name.toLowerCase().includes(q) || a.doctor_name.toLowerCase().includes(q)) &&
        (!status || a.status === status)
      ));
    }

    // ── Doctors ───────────────────────────────────────
    async function loadDoctors() {
      try {
        const res = await fetch(`${API_BASE}/admin/doctors`, { headers: authHeaders() });
        if (!res.ok) throw new Error();
        allDoctors = await res.json();
        renderDoctors(allDoctors);
      } catch {
        document.getElementById('doctorsTable').innerHTML = errorRow();
      }
    }

    function renderDoctors(doctors) {
      if (!doctors.length) { document.getElementById('doctorsTable').innerHTML = emptyRow('No doctors yet. Add one →'); return; }
      document.getElementById('doctorsTable').innerHTML = `
        <table>
          <thead><tr>
            <th>ID</th><th>Name</th><th>Email</th><th>Specialization</th><th>Experience</th><th>Appointments</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${doctors.map(d => `
              <tr>
                <td class="td-mono td-muted">#${d.doctor_id}</td>
                <td style="font-weight:500">${d.name}</td>
                <td class="td-muted">${d.email || '—'}</td>
                <td class="td-muted">${d.specialization || '—'}</td>
                <td class="td-muted">${d.experience_years ? d.experience_years + ' yrs' : '—'}</td>
                <td class="td-muted">${d.appointment_count}</td>
                <td>
                  <div style="display:flex;gap:6px">
                    <button class="btn-sm" onclick="openEditDoctor(${d.doctor_id}, '${(d.name||'').replace(/'/g,"\\'")}', '${(d.specialization||'').replace(/'/g,"\\'")}', ${d.experience_years||0})">Edit</button>
                    <button class="btn-sm-danger" onclick="removeDoctor(${d.doctor_id}, this)">Remove</button>
                  </div>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    }

    function filterDoctors() {
      const q = document.getElementById('doctorSearch').value.toLowerCase();
      renderDoctors(allDoctors.filter(d =>
        !q || d.name.toLowerCase().includes(q) || (d.specialization || '').toLowerCase().includes(q)
      ));
    }

    // ── Add / Edit doctor modal ───────────────────────
    function openAddDoctor() {
      editingDoctorId = null;
      document.getElementById('modalTitle').textContent = 'Add Doctor';
      document.getElementById('docName').value = '';
      document.getElementById('docSpec').value = '';
      document.getElementById('docExp').value = '';
      document.getElementById('modalMsg').innerHTML = '';
      document.getElementById('saveDocBtn').textContent = 'Add Doctor';
      document.getElementById('addDoctorModal').classList.add('visible');
    }

    function openEditDoctor(id, name, spec, exp) {
      editingDoctorId = id;
      document.getElementById('modalTitle').textContent = 'Edit Doctor';
      document.getElementById('docName').value = name;
      document.getElementById('docSpec').value = spec;
      document.getElementById('docExp').value = exp;
      document.getElementById('modalMsg').innerHTML = '';
      document.getElementById('saveDocBtn').textContent = 'Save Changes';
      document.getElementById('addDoctorModal').classList.add('visible');
    }

    function closeModal() {
      document.getElementById('addDoctorModal').classList.remove('visible');
    }

    function handleModalClick(e) {
      if (e.target === document.getElementById('addDoctorModal')) closeModal();
    }

    async function saveDoctor() {
      const name = document.getElementById('docName').value.trim();
      const specialization = document.getElementById('docSpec').value || null;
      const experience_years = parseInt(document.getElementById('docExp').value) || 0;
      const msgEl = document.getElementById('modalMsg');

      if (!name) {
        msgEl.innerHTML = `<div class="msg-inline error">Doctor name is required</div>`;
        return;
      }

      const btn = document.getElementById('saveDocBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>' + (editingDoctorId ? 'Saving...' : 'Adding...');

      try {
        const url = editingDoctorId
          ? `${API_BASE}/admin/doctors/${editingDoctorId}`
          : `${API_BASE}/admin/doctors`;
        const method = editingDoctorId ? 'PUT' : 'POST';

        const res = await fetch(url, {
          method,
          headers: authHeaders(),
          body: JSON.stringify({ name, specialization, experience_years })
        });

        const data = await res.json();
        if (!res.ok) { msgEl.innerHTML = `<div class="msg-inline error">${data.detail || 'Failed'}</div>`; return; }

        msgEl.innerHTML = `<div class="msg-inline success">${editingDoctorId ? 'Doctor updated!' : 'Doctor added!'}</div>`;
        await loadDoctors();
        setTimeout(closeModal, 1000);
      } catch {
        msgEl.innerHTML = `<div class="msg-inline error">Could not connect to server</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = editingDoctorId ? 'Save Changes' : 'Add Doctor';
      }
    }

    async function removeDoctor(id, btn) {
      if (!confirm('Remove this doctor? This cannot be undone.')) return;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      try {
        const res = await fetch(`${API_BASE}/admin/doctors/${id}`, {
          method: 'DELETE', headers: authHeaders()
        });
        if (res.ok) { await loadDoctors(); }
      } catch {}
      btn.disabled = false;
    }

    // ── Helpers ───────────────────────────────────────
    function emptyRow(msg) {
      return `<div class="empty-state" style="padding:40px 20px">
        <div class="empty-icon">📭</div>
        <div class="empty-title">${msg}</div>
      </div>`;
    }

    function errorRow() {
      return `<div class="empty-state" style="padding:40px 20px">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Could not load data</div>
        <div class="empty-sub">Check that the backend is deployed and running</div>
      </div>`;
    }

    // ── Init ──────────────────────────────────────────
    async function init() {
      await Promise.all([loadStats(), loadUsers(), loadAppointments(), loadDoctors()]);
    }

    init();
  </script>
</body>
</html>
