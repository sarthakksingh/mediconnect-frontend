<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | MediConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #171b26; --surface2: #1e2333;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
      --text: #e8eaf0; --muted: #7a8099;
      --teal: #2dd4bf; --teal-dim: rgba(45,212,191,0.12);
      --amber: #fbbf24; --amber-dim: rgba(251,191,36,0.12);
      --red: #f87171; --red-dim: rgba(248,113,113,0.10);
      --green: #4ade80; --green-dim: rgba(74,222,128,0.10);
      --blue: #60a5fa; --blue-dim: rgba(96,165,250,0.10);
      --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.10);
      --sidebar-w: 240px; --radius: 12px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

    .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 0; position: fixed; height: 100vh; top: 0; left: 0; z-index: 100; }
    .sidebar-logo { padding: 0 20px 24px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .logo-text { font-size: 18px; font-weight: 600; color: var(--teal); letter-spacing: -0.3px; }
    .logo-sub  { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }

    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; font-size: 14px; color: var(--muted); cursor: pointer; text-decoration: none; border-left: 2px solid transparent; transition: all 0.15s; }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .nav-item.active { color: var(--teal); border-left-color: var(--teal); background: var(--teal-dim); }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-footer { margin-top: auto; padding: 16px 20px; border-top: 1px solid var(--border); }
    .admin-badge { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 36px; height: 36px; background: var(--purple-dim); border: 1px solid var(--purple); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: var(--purple); flex-shrink: 0; }
    .badge-info { flex: 1; min-width: 0; }
    .badge-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge-role { font-size: 11px; color: var(--purple); font-family: 'DM Mono', monospace; }
    .logout-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px; transition: color 0.15s; }
    .logout-btn:hover { color: var(--red); }

    .main { margin-left: var(--sidebar-w); flex: 1; padding: 32px; max-width: 1200px; }
    .page-greeting { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .page-title { font-size: 24px; font-weight: 600; letter-spacing: -0.4px; }
    .page-date  { font-size: 13px; color: var(--muted); margin-top: 4px; margin-bottom: 28px; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; display: flex; align-items: center; gap: 14px; }
    .stat-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 19px; flex-shrink: 0; }
    .stat-val   { font-size: 26px; font-weight: 600; line-height: 1; }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .tab-nav { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; margin-bottom: 20px; width: fit-content; }
    .tab-btn { background: none; border: none; padding: 8px 18px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border-radius: 8px; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { background: var(--surface2); color: var(--text); }

    .panel { display: none; }
    .panel.active { display: block; }

    .mini-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .mini-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
    .mini-val   { font-size: 28px; font-weight: 600; line-height: 1; }
    .mini-label { font-size: 11px; color: var(--muted); margin-top: 5px; }

    .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .table-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); gap: 10px; flex-wrap: wrap; }
    .table-title { font-size: 14px; font-weight: 600; }
    .toolbar-right { display: flex; gap: 8px; align-items: center; }

    .input-sm { padding: 7px 12px; border: 1px solid var(--border2); border-radius: 8px; font-size: 13px; font-family: inherit; background: var(--surface2); color: var(--text); width: 210px; outline: none; transition: border-color 0.15s; }
    .input-sm::placeholder { color: var(--muted); }
    .input-sm:focus { border-color: var(--teal); }
    .select-sm { padding: 7px 12px; border: 1px solid var(--border2); border-radius: 8px; font-size: 13px; font-family: inherit; background: var(--surface2); color: var(--text); outline: none; cursor: pointer; }
    .select-sm option { background: var(--surface2); }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; border-bottom: 1px solid var(--border); background: var(--surface2); white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody td { padding: 12px 16px; vertical-align: middle; }
    .td-muted { color: var(--muted); font-size: 12px; }
    .td-mono  { font-family: 'DM Mono', monospace; font-size: 12px; }

    .chip { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 500; font-family: 'DM Mono', monospace; white-space: nowrap; }
    .chip-teal   { background: var(--teal-dim);   color: var(--teal);   }
    .chip-amber  { background: var(--amber-dim);  color: var(--amber);  }
    .chip-red    { background: var(--red-dim);    color: var(--red);    }
    .chip-green  { background: var(--green-dim);  color: var(--green);  }
    .chip-blue   { background: var(--blue-dim);   color: var(--blue);   }
    .chip-purple { background: var(--purple-dim); color: var(--purple); }

    .btn-primary { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; background: var(--teal); color: #0f1117; border: none; font-family: inherit; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-ghost { padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; background: var(--surface2); color: var(--muted); border: 1px solid var(--border2); font-family: inherit; transition: all 0.15s; }
    .btn-ghost:hover { color: var(--text); border-color: var(--teal); }
    .btn-danger { padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,113,0.2); font-family: inherit; transition: all 0.15s; }
    .btn-danger:hover { background: rgba(248,113,113,0.18); }

    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.72); display: flex; align-items: center; justify-content: center; z-index: 500; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 28px; width: 440px; max-width: 95vw; transform: translateY(12px); transition: transform 0.2s; }
    .modal-backdrop.open .modal { transform: translateY(0); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-size: 17px; font-weight: 600; }
    .close-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; padding: 4px; transition: color 0.15s; }
    .close-btn:hover { color: var(--text); }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 5px; }
    .field input, .field select { width: 100%; padding: 9px 12px; border: 1px solid var(--border2); border-radius: 8px; font-size: 14px; font-family: inherit; background: var(--surface2); color: var(--text); outline: none; transition: border-color 0.15s; }
    .field input:focus, .field select:focus { border-color: var(--teal); }
    .field select option { background: var(--surface2); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
    .msg { font-size: 13px; padding: 8px 12px; border-radius: 8px; margin-top: 10px; }
    .msg.error   { background: var(--red-dim);   color: var(--red);   }
    .msg.success { background: var(--green-dim); color: var(--green); }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-icon  { font-size: 30px; margin-bottom: 10px; }
    .empty-title { font-size: 15px; font-weight: 500; color: var(--text); }
    .empty-sub   { font-size: 13px; margin-top: 4px; }

    .shimmer { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 8px; height: 52px; margin-bottom: 8px; }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.15); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 5px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-text">MediConnect</div>
    <div class="logo-sub">ADMIN PORTAL</div>
  </div>
  <a class="nav-item active" onclick="switchPanel('overview',this)"><span class="nav-icon">🏠</span> Overview</a>
  <a class="nav-item" onclick="switchPanel('users',this)"><span class="nav-icon">👥</span> Users</a>
  <a class="nav-item" onclick="switchPanel('appointments',this)"><span class="nav-icon">📅</span> Appointments</a>
  <a class="nav-item" onclick="switchPanel('doctors',this)"><span class="nav-icon">👨‍⚕️</span> Doctors</a>
  <div class="sidebar-footer">
    <div class="admin-badge">
      <div class="avatar" id="sidebarInitial">A</div>
      <div class="badge-info">
        <div class="badge-name" id="sidebarName">Admin</div>
        <div class="badge-role">ADMIN</div>
      </div>
      <button class="logout-btn" onclick="logout()" title="Sign out">⏏</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="page-greeting">Admin panel 🛡️</div>
  <div class="page-title" id="pageTitle">Welcome</div>
  <div class="page-date"  id="pageDate"></div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-icon" style="background:var(--blue-dim)">👥</div><div><div class="stat-val" id="statUsers">—</div><div class="stat-label">Registered users</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:var(--purple-dim)">👨‍⚕️</div><div><div class="stat-val" id="statDoctors">—</div><div class="stat-label">Doctors</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:var(--teal-dim)">📅</div><div><div class="stat-val" id="statAppts">—</div><div class="stat-label">Total appointments</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:var(--amber-dim)">⏳</div><div><div class="stat-val" id="statPending">—</div><div class="stat-label">Pending requests</div></div></div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" id="tab-overview"     onclick="switchPanel('overview',this)">Overview</button>
    <button class="tab-btn"        id="tab-users"        onclick="switchPanel('users',this)">Users</button>
    <button class="tab-btn"        id="tab-appointments" onclick="switchPanel('appointments',this)">Appointments</button>
    <button class="tab-btn"        id="tab-doctors"      onclick="switchPanel('doctors',this)">Doctors</button>
  </div>

  <div class="panel active" id="panel-overview">
    <div class="mini-grid" id="statusGrid"><div class="shimmer"></div><div class="shimmer"></div><div class="shimmer"></div><div class="shimmer"></div></div>
    <div class="table-card">
      <div class="table-toolbar"><span class="table-title">Recent appointments</span></div>
      <div id="recentTable"><div style="padding:20px"><div class="shimmer"></div><div class="shimmer"></div><div class="shimmer"></div></div></div>
    </div>
  </div>

  <div class="panel" id="panel-users">
    <div class="table-card">
      <div class="table-toolbar">
        <input class="input-sm" id="userSearch" type="text" placeholder="Search name or email…" oninput="filterUsers()">
        <div class="toolbar-right"><select class="select-sm" id="roleFilter" onchange="filterUsers()"><option value="">All roles</option><option value="PATIENT">Patients</option><option value="DOCTOR">Doctors</option><option value="ADMIN">Admins</option></select></div>
      </div>
      <div id="usersTable"><div style="padding:20px"><div class="shimmer"></div><div class="shimmer"></div><div class="shimmer"></div></div></div>
    </div>
  </div>

  <div class="panel" id="panel-appointments">
    <div class="table-card">
      <div class="table-toolbar">
        <input class="input-sm" id="apptSearch" type="text" placeholder="Search patient or doctor…" oninput="filterAppts()">
        <div class="toolbar-right"><select class="select-sm" id="apptStatusFilter" onchange="filterAppts()"><option value="">All statuses</option><option value="pending">Pending</option><option value="confirmed">Confirmed</option><option value="cancelled">Cancelled</option><option value="completed">Completed</option></select></div>
      </div>
      <div id="apptsTable"><div style="padding:20px"><div class="shimmer"></div><div class="shimmer"></div><div class="shimmer"></div></div></div>
    </div>
  </div>

  <div class="panel" id="panel-doctors">
    <div class="table-card">
      <div class="table-toolbar">
        <input class="input-sm" id="doctorSearch" type="text" placeholder="Search name or specialization…" oninput="filterDoctors()">
        <div class="toolbar-right"><button class="btn-primary" onclick="openAddDoctor()">+ Add Doctor</button></div>
      </div>
      <div id="doctorsTable"><div style="padding:20px"><div class="shimmer"></div><div class="shimmer"></div><div class="shimmer"></div></div></div>
    </div>
  </div>
</main>

<div class="modal-backdrop" id="doctorModal" onclick="handleModalClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Doctor</div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="field"><label>Full Name</label><input type="text" id="docName" placeholder="Dr. Rajan Mehta"></div>
    <div class="field"><label>Specialization</label>
      <select id="docSpec"><option value="">Select specialization</option><option>Cardiology</option><option>Dermatology</option><option>Orthopedics</option><option>Neurology</option><option>Pediatrics</option><option>General Medicine</option><option>Gynecology</option><option>Ophthalmology</option><option>ENT</option><option>Psychiatry</option></select>
    </div>
    <div class="field"><label>Years of Experience</label><input type="number" id="docExp" placeholder="5" min="0" max="60"></div>
    <div id="modalMsg"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="saveDocBtn" onclick="saveDoctor()">Add Doctor</button>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script>
  (function(){
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = 'index.html'; return; }
    const role = localStorage.getItem('user_role') || '';
    if (role && role !== 'ADMIN') { window.location.href = role === 'DOCTOR' ? 'doctor-dashboard.html' : 'dashboard.html'; }
  })();

  const adminName = localStorage.getItem('user_name') || 'Admin';
  document.getElementById('pageTitle').textContent    = 'Welcome, ' + adminName;
  document.getElementById('sidebarName').textContent  = adminName;
  document.getElementById('sidebarInitial').textContent = adminName[0].toUpperCase();
  document.getElementById('pageDate').textContent = new Date().toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  let allUsers = [], allAppts = [], allDoctors = [], editingDoctorId = null;

  function switchPanel(name, el) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    const tab = document.getElementById('tab-' + name);
    if (tab) tab.classList.add('active');
    if (el && el.classList.contains('nav-item')) el.classList.add('active');
  }

  async function loadStats() {
    try {
      const res = await fetch(`${API_BASE}/admin/stats`, { headers: authHeaders() });
      if (res.status === 401) { logout(); return; }
      if (!res.ok) throw new Error();
      const d = await res.json();
      document.getElementById('statUsers').textContent   = d.total_users;
      document.getElementById('statDoctors').textContent = d.total_doctors;
      document.getElementById('statAppts').textContent   = d.total_appointments;
      document.getElementById('statPending').textContent = d.appointments_by_status.pending;
      const cfg = { pending:{c:'var(--amber)',i:'⏳'}, confirmed:{c:'var(--green)',i:'✅'}, cancelled:{c:'var(--red)',i:'✖'}, completed:{c:'var(--blue)',i:'🏁'} };
      document.getElementById('statusGrid').innerHTML = Object.entries(d.appointments_by_status).map(([s,n]) => {
        const x = cfg[s] || {c:'var(--teal)',i:'📋'};
        return `<div class="mini-card"><div class="mini-val" style="color:${x.c}">${n}</div><div class="mini-label">${x.i} ${s}</div></div>`;
      }).join('');
    } catch { document.getElementById('statusGrid').innerHTML = `<div style="color:var(--muted);grid-column:1/-1;padding:12px;font-size:13px">Could not load stats</div>`; }
  }

  async function loadUsers() {
    try {
      const res = await fetch(`${API_BASE}/admin/users`, { headers: authHeaders() });
      if (!res.ok) throw new Error();
      allUsers = await res.json(); renderUsers(allUsers);
    } catch { document.getElementById('usersTable').innerHTML = errState(); }
  }

  function renderUsers(users) {
    if (!users.length) { document.getElementById('usersTable').innerHTML = emptyState('No users found'); return; }
    const cm = { PATIENT:'chip-green', DOCTOR:'chip-blue', ADMIN:'chip-purple' };
    document.getElementById('usersTable').innerHTML = `<table><thead><tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Visits</th></tr></thead><tbody>`
      + users.map(u => `<tr><td class="td-mono td-muted">${u.user_id}</td><td style="font-weight:500">${u.name}</td><td class="td-muted">${u.email}</td><td class="td-muted">${u.phone||'—'}</td><td><span class="chip ${cm[u.role]||'chip-teal'}">${u.role}</span></td><td class="td-muted">${u.appointment_count??'—'}</td></tr>`).join('')
      + `</tbody></table>`;
  }

  function filterUsers() {
    const q = document.getElementById('userSearch').value.toLowerCase();
    const r = document.getElementById('roleFilter').value;
    renderUsers(allUsers.filter(u => (!q||u.name.toLowerCase().includes(q)||u.email.toLowerCase().includes(q)) && (!r||u.role===r)));
  }

  async function loadAppointments() {
    try {
      const res = await fetch(`${API_BASE}/admin/appointments`, { headers: authHeaders() });
      if (!res.ok) throw new Error();
      allAppts = await res.json(); renderAppts(allAppts); renderRecent(allAppts.slice(0,8));
    } catch { document.getElementById('apptsTable').innerHTML = errState(); document.getElementById('recentTable').innerHTML = errState(); }
  }

  const CM = { pending:'chip-amber', confirmed:'chip-green', cancelled:'chip-red', completed:'chip-blue' };

  function renderRecent(appts) {
    if (!appts.length) { document.getElementById('recentTable').innerHTML = emptyState('No appointments yet'); return; }
    document.getElementById('recentTable').innerHTML = `<table><thead><tr><th>Patient</th><th>Doctor</th><th>Date & Time</th><th>Status</th></tr></thead><tbody>`
      + appts.map(a => { const dt=new Date(a.date_time); return `<tr><td style="font-weight:500">${a.patient_name}</td><td class="td-muted">${a.doctor_name}</td><td class="td-mono td-muted">${dt.toLocaleDateString('en-IN',{day:'numeric',month:'short'})} · ${dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})}</td><td><span class="chip ${CM[a.status]||'chip-amber'}">${a.status}</span></td></tr>`; }).join('')
      + `</tbody></table>`;
  }

  function renderAppts(appts) {
    if (!appts.length) { document.getElementById('apptsTable').innerHTML = emptyState('No appointments found'); return; }
    document.getElementById('apptsTable').innerHTML = `<table><thead><tr><th>#</th><th>Patient</th><th>Doctor</th><th>Spec.</th><th>Date & Time</th><th>Reason</th><th>Status</th></tr></thead><tbody>`
      + appts.map(a => { const dt=new Date(a.date_time); return `<tr><td class="td-mono td-muted">#${a.appointment_id}</td><td style="font-weight:500">${a.patient_name}<br><span class="td-muted">${a.patient_email}</span></td><td class="td-muted">${a.doctor_name}</td><td class="td-muted">${a.doctor_specialization||'—'}</td><td class="td-mono td-muted">${dt.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}<br>${dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})}</td><td class="td-muted">${a.reason||'—'}</td><td><span class="chip ${CM[a.status]||'chip-amber'}">${a.status}</span></td></tr>`; }).join('')
      + `</tbody></table>`;
  }

  function filterAppts() {
    const q = document.getElementById('apptSearch').value.toLowerCase();
    const s = document.getElementById('apptStatusFilter').value;
    renderAppts(allAppts.filter(a => (!q||a.patient_name.toLowerCase().includes(q)||a.doctor_name.toLowerCase().includes(q)) && (!s||a.status===s)));
  }

  async function loadDoctors() {
    try {
      const res = await fetch(`${API_BASE}/admin/doctors`, { headers: authHeaders() });
      if (!res.ok) throw new Error();
      allDoctors = await res.json(); renderDoctors(allDoctors);
    } catch { document.getElementById('doctorsTable').innerHTML = errState(); }
  }

  function renderDoctors(doctors) {
    if (!doctors.length) { document.getElementById('doctorsTable').innerHTML = emptyState('No doctors yet'); return; }
    document.getElementById('doctorsTable').innerHTML = `<table><thead><tr><th>#</th><th>Name</th><th>Email</th><th>Specialization</th><th>Experience</th><th>Appointments</th><th>Actions</th></tr></thead><tbody>`
      + doctors.map(d => `<tr><td class="td-mono td-muted">${d.doctor_id}</td><td style="font-weight:500">${d.name}</td><td class="td-muted">${d.email||'—'}</td><td class="td-muted">${d.specialization||'—'}</td><td class="td-muted">${d.experience_years?d.experience_years+' yrs':'—'}</td><td class="td-muted">${d.appointment_count}</td><td><div style="display:flex;gap:6px"><button class="btn-ghost" onclick="openEditDoctor(${d.doctor_id},'${esc(d.name)}','${esc(d.specialization||'')}',${d.experience_years||0})">Edit</button><button class="btn-danger" onclick="removeDoctor(${d.doctor_id},this)">Remove</button></div></td></tr>`).join('')
      + `</tbody></table>`;
  }

  function filterDoctors() {
    const q = document.getElementById('doctorSearch').value.toLowerCase();
    renderDoctors(allDoctors.filter(d => !q||d.name.toLowerCase().includes(q)||(d.specialization||'').toLowerCase().includes(q)));
  }

  function openAddDoctor() {
    editingDoctorId=null; document.getElementById('modalTitle').textContent='Add Doctor';
    ['docName','docSpec','docExp'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('modalMsg').innerHTML=''; document.getElementById('saveDocBtn').textContent='Add Doctor';
    document.getElementById('doctorModal').classList.add('open');
  }

  function openEditDoctor(id,name,spec,exp) {
    editingDoctorId=id; document.getElementById('modalTitle').textContent='Edit Doctor';
    document.getElementById('docName').value=name; document.getElementById('docSpec').value=spec; document.getElementById('docExp').value=exp;
    document.getElementById('modalMsg').innerHTML=''; document.getElementById('saveDocBtn').textContent='Save Changes';
    document.getElementById('doctorModal').classList.add('open');
  }

  function closeModal() { document.getElementById('doctorModal').classList.remove('open'); }
  function handleModalClick(e) { if (e.target===document.getElementById('doctorModal')) closeModal(); }

  async function saveDoctor() {
    const name=document.getElementById('docName').value.trim();
    const specialization=document.getElementById('docSpec').value||null;
    const experience_years=parseInt(document.getElementById('docExp').value)||0;
    const msgEl=document.getElementById('modalMsg');
    if (!name) { msgEl.innerHTML=`<div class="msg error">Doctor name is required</div>`; return; }
    const btn=document.getElementById('saveDocBtn'); btn.disabled=true;
    btn.innerHTML=`<span class="spinner"></span>${editingDoctorId?'Saving…':'Adding…'}`;
    try {
      const url=editingDoctorId?`${API_BASE}/admin/doctors/${editingDoctorId}`:`${API_BASE}/admin/doctors`;
      const res=await fetch(url,{method:editingDoctorId?'PUT':'POST',headers:authHeaders(),body:JSON.stringify({name,specialization,experience_years})});
      const data=await res.json();
      if (!res.ok) { msgEl.innerHTML=`<div class="msg error">${data.detail||'Failed'}</div>`; return; }
      msgEl.innerHTML=`<div class="msg success">${editingDoctorId?'Doctor updated!':'Doctor added!'}</div>`;
      await loadDoctors(); setTimeout(closeModal,900);
    } catch { msgEl.innerHTML=`<div class="msg error">Could not connect to server</div>`; }
    finally { btn.disabled=false; btn.textContent=editingDoctorId?'Save Changes':'Add Doctor'; }
  }

  async function removeDoctor(id,btn) {
    if (!confirm('Remove this doctor? This cannot be undone.')) return;
    btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
    try { const res=await fetch(`${API_BASE}/admin/doctors/${id}`,{method:'DELETE',headers:authHeaders()}); if (res.ok) await loadDoctors(); }
    catch {} btn.disabled=false; btn.textContent='Remove';
  }

  const esc = s => (s||'').replace(/'/g,"\\'");
  function emptyState(msg) { return `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">${msg}</div></div>`; }
  function errState() { return `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load data</div><div class="empty-sub">Check backend is deployed</div></div>`; }

  Promise.all([loadStats(), loadUsers(), loadAppointments(), loadDoctors()]);
</script>
</body>
</html>
